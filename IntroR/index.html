<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>イントロクイズ(回答者側)</title>
</head>
<body>
  <h1>&lt;イントロクイズ(回答者側)&gt;</h1>

  <style>
    /* ① 背景：薄青 */
    body {
      background-color: #e8f4ff;
      font-family: "Meiryo", sans-serif;
      padding: 20px;
    }

    /* 全体レイアウト */
    .container {
      width: 900px;
      margin: 0 auto;
    }

    /* ② あなたのID 表示 */
    .id-label {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
      display: inline-block;
    }

    #myId {
      font-size: 20px;
      font-weight: bold;
      padding: 5px 10px;
      margin-left: 10px;
    }

    /* ③ アーティスト・曲名（出題者と同じデザイン） */
    .label {
      font-size: 22px;
      font-weight: bold;
      margin-top: 20px;
    }

    .value-box {
      width: 400px;
      padding: 10px;
      border: 2px solid #444;
      background: #fff;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
      min-height: 40px; /* ← これを追加 */
    }

    /* ④ ヨシ！判った!!! ボタン */
    #btnAnswer {
      display: block;
      font-size: 26px;
      font-weight: bold;
      padding: 15px 30px;
      margin-top: 20px;
      background-color: #ffd966; /* 黄色系 */
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #btnAnswer:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }

    #btnAnswer:hover:enabled {
      opacity: 0.85;
    }

    /* ⑤ 今の曲の回答 */
    .answer-header {
      margin-top: 30px;
      font-size: 20px;
      font-weight: bold;
      color: #333;
    }
  </style>

  <div class="container">
    <label class="id-label">あなたのID：</label>
    <select id="myId">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
    </select>

    <button id="btnAnswer" disabled>ヨシ！判った！！！</button>

    <p class="answer-header">----- 今の曲の回答 -----</p>

    <p class="label">アーティスト：</p>
    <div class="value-box" id="artist">-</div>

    <p class="label">曲名：</p>
    <div class="value-box" id="title">-</div>
  </div>

  <script type="module">
    // ★ 曲リスト（例：実際は全曲分をここに入れる）
    import { songListBGM } from "../songlist_BGM.js";
    import { songListSAS } from "../songlist_SAS.js";

    // Firebase SDK 読み込み
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    // Firebase 設定
    const firebaseConfig = {
      apiKey: "AIzaSyBiMbPLYjpzKyeb5JH8djxTRTEMhSDXjdk",
      authDomain: "intro-21.firebaseapp.com",
      databaseURL: "https://intro-21-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "intro-21",
      storageBucket: "intro-21.firebasestorage.app",
      messagingSenderId: "147380245042",
      appId: "1:147380245042:web:95784f969f8a3150bfe22b"
    };

    // Firebase 初期化
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // UI 要素
    const artist = document.getElementById("artist");
    const title = document.getElementById("title");
    const btnAnswer = document.getElementById("btnAnswer");
    const myId = document.getElementById("myId");

    // ★ 音声プレイヤー
    let audio = new Audio();

    // ★ 回答ボタン → SC3（回答者ID）送信
    btnAnswer.addEventListener("click", () => {
      const id = myId.value;
      push(ref(db, "answers/list"), id);
      btnAnswer.disabled = true;
    });

    // ★ コマンド受信（SC1 / SC2 / SC4）
    onValue(ref(db, "commands/current"), (snapshot) => {
      const cmd = snapshot.val();
      if (!cmd) return;

      const parts = cmd.split(",");

      // SC1（Ready）
      if (parts[0] === "SC1") {
        artist.textContent = "Ready";
        title.textContent = "";
        btnAnswer.disabled = false;
        audio.pause();
      }

// SC2（イントロ再生）
if (parts[0] === "SC2") {
  const folder = Number(parts[1]);
  const speed  = Number(parts[2]);  // ← これで再生時間を切り替える
  const songNo = Number(parts[3]);

  let song;
  if (folder === 1) song = songListBGM[songNo - 1];
  if (folder === 2) song = songListSAS[songNo - 1];

  if (!song) return;

  artist.textContent = "";
  title.textContent  = "";

  audio.pause();
  audio = new Audio(song.url);

  // 再生速度は固定（必要なら）
  audio.playbackRate = 1.0;

  audio.currentTime = 0;
  audio.play();

  // ★ 再生時間を speed で切り替え
  let durationMs = 3000; // デフォルト3秒

  if (speed === 1) durationMs = 3000; // 3秒
  if (speed === 2) durationMs = 2000; // 2秒
  if (speed === 3) durationMs = 1000; // 1秒

  setTimeout(() => audio.pause(), durationMs);
}

      // SC4（正解発表）
      if (parts[0] === "SC4") {
        const folder = Number(parts[1]);
        const speed = Number(parts[2]);
        const songNo = Number(parts[3]);

        let song;
        if (folder === 1) song = songListBGM[songNo - 1];
        if (folder === 2) song = songListSAS[songNo - 1];

        if (!song) return;

        artist.textContent = song.artist;
        title.textContent = song.title;

        audio.pause();
        audio = new Audio(song.url);
        audio.play();
      }
    });
  </script>

</body>
</html>
