<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <title>イントロクイズ(出題者側)</title>

  <style>
    /* 背景 */
    body {
      background-color: #ffe6f2;
      font-family: "Meiryo", sans-serif;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;   /* PCでは420px */
      margin: 40px auto;
      padding: 20px;
      background: #fff8dc;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    /* タイトル */
    .id-title {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
      text-align: center;
      margin-bottom: 2em;
    }

    #row-1 {
      display: flex;
      align-items: center;   /* 縦方向の中央揃え */
      gap: 10px;             /* 要素間のすき間 */
    }
    
    /* フォルダ */
    #folder {
      font-size: 20px;
      font-weight: bold;
      padding: 5px 10px;
      border: 2px solid #444;
      margin: 10px 0;
      margin-right: 40px;
    }

    #row-2 {
      display: flex;
      align-items: center;   /* 縦方向の中央揃え */
      gap: 10px;             /* 要素間のすき間 */
    }

    /* 速度 */
    #speed {
      font-size: 20px;
      font-weight: bold;
      padding: 5px 10px;
      border: 2px solid #444;
      margin: 10px 0;
    }

    /* 選曲数/アーティスト名/曲名 */
    .label {
      font-size: 18px;
      font-weight: bold;
      margin-top: 15px;
    }

    .value-box-1 {
      width: 60px;
      padding: 5px;
      border: 2px solid #444;
      background: #fff;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 5px;
      text-align: center;   /* ← 数字を中央に */
    }

    .value-box-2 {
      max-width: 400px;
      padding: 5px;
      border: 2px solid #444;
      background: #fff;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    #row-3 {
      display: flex;
      justify-content: flex-end; /* ← ★ 右寄せ */
      width: 100%;
    }

    /* 回答者リスト */
    .answer-area {
      margin-top: 20px;
    }

    .answer-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #disp-ans {
      font-size: 20px;
      font-weight: bold;
      padding: 5px 10px;
      border: 2px solid #444;
      margin: 10px 0;
    }

    .answer-boxes {
      display: flex;
      gap: 10px;
    }

    .ans-box {
      flex: 1;               /* ← 自動で均等に広がる */
      min-width: 60px;       /* ← 小さすぎ防止 */
      height: 60px;
      border: 2px solid #444;
      background: #fff;
      font-size: 20px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ボタン */
    button {
      font-size: 22px;
      font-weight: bold;
      padding: 12px 25px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      /*width: 110px;*/
      height: 60px;
    }

    /* ボタン色 */
    .btn-ready { background-color: #a0d8ef; }   /* 水色 */
    .btn-select { background-color: #ffe28a; }  /* 黄色 */
    .btn-play { background-color: #ffb3b3; }    /* ピンク */
    .btn-answer { background-color: #c6ff8a; }  /* 黄緑 */

    button:hover {
      opacity: 0.8;
    }

  </style>
</head>

<body>
  <div class="container">
    <div class="id-title">
      &lt;イントロクイズ(出題者側)&gt;
    </div>

  <div id="row-1">
    <select id="folder">
      <!-- <option value="1">BGM</option>-->
      <option value="2">SAS</option>
    </select>

    <p class="label">選曲数：</p>

    <div class="value-box-1" id="count">0</div>

    <button class="btn-select" onclick="selectSong()">選曲</button>
  </div>

  <p class="label">イントロスタート：</p>

  <div id="row-2">
    <select id="speed">
      <option value="1">ノーマル</option>
      <option value="2">ウルトラ</option>
      <option value="3">超ウルトラ</option>
    </select>

    <button class="btn-ready" onclick="sendSC1()">Ready</button>

    <button class="btn-play" onclick="sendPlay()">PLAY</button>
  </div>

  <p class="label">アーティスト名：</p>
  <div class="value-box-2" id="artist">-</div>

  <p class="label">曲名：</p>
  <div class="value-box-2" id="title">-</div>

  <div id="row-3">
    <select id="disp-ans">
      <option value="1">後出</option>
      <option value="2">先出</option>
    </select>

    <button class="btn-answer" onclick="sendAnswer()">回答</button>
  </div>

  <div class="answer-area">
    <div class="answer-title">回答者リスト：</div>
    <div class="answer-boxes">
      <div class="ans-box" id="ans1">-</div>
      <div class="ans-box" id="ans2">-</div>
      <div class="ans-box" id="ans3">-</div>
      <div class="ans-box" id="ans4">-</div>
      <div class="ans-box" id="ans5">-</div>
    </div>
  </div>

  <!-- メインスクリプト（ES Module） -->
  <script type="module" src="./main.js"></script>
  </body>
</html>
