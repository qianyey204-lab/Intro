<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>イントロクイズ(出題者側)</title>
</head>
<body>
  <h1>&lt;イントロクイズ(出題者側)&gt;</h1>

  <style>
    /* ① パネル背景色：薄緑 */
    body {
      background-color: #e8ffe8;
      font-family: "Meiryo", sans-serif;
    }

    /* 全体レイアウト */
    .container {
      width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ② folder / speed のデザイン */
    #folder, #speed {
      font-size: 20px;
      font-weight: bold;
      padding: 5px 10px;
      margin: 10px 0;
    }

    /* ③④⑤ 見出しと値の表示エリア */
    .label {
      font-size: 22px;
      font-weight: bold;
      margin-top: 15px;
    }

    .value-box {
      width: 400px;
      padding: 10px;
      border: 2px solid #444;
      background: #fff;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    /* ⑥ 回答者リスト */
    .answer-area {
      margin-top: 20px;
    }

    .answer-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .answer-boxes {
      display: flex;
      gap: 10px;
    }

    .ans-box {
      width: 120px;
      height: 60px;
      border: 2px solid #444;
      background: #fff;
      font-size: 22px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ⑦⑧⑨⑩ ボタンデザイン */
    button {
      font-size: 22px;
      font-weight: bold;
      padding: 12px 25px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    /* ボタン色 */
    .btn-ready { background-color: #a0d8ef; }   /* 水色 */
    .btn-select { background-color: #ffe28a; }  /* 黄色 */
    .btn-play { background-color: #ffb3b3; }    /* ピンク */
    .btn-answer { background-color: #c6ff8a; }  /* 黄緑 */

    button:hover {
      opacity: 0.8;
    }
  </style>

  <button class="btn-ready" onclick="sendSC1()">Ready</button>
  <button class="btn-play" onclick="sendPlay()">PLAY</button>
  <button class="btn-answer" onclick="sendAnswer()">回答</button>
  <button class="btn-select" onclick="selectSong()">選曲</button>

  <select id="folder">
    <option value="1">BGM</option>
    <option value="2">SAS</option>
  </select>

  <p class="label">選曲数：</p>
  <div class="value-box" id="count">0</div>

  <p class="label">アーティスト：</p>
  <div class="value-box" id="artist">-</div>

  <p class="label">曲名：</p>
  <div class="value-box" id="title">-</div>

  <select id="speed">
    <option value="1">ノーマル</option>
    <option value="2">ウルトラ</option>
    <option value="3">超ウルトラ</option>
  </select>

  <div class="answer-area">
    <div class="answer-title">回答者リスト：</div>
    <div class="answer-boxes">
      <div class="ans-box" id="ans1">-</div>
      <div class="ans-box" id="ans2">-</div>
      <div class="ans-box" id="ans3">-</div>
      <div class="ans-box" id="ans4">-</div>
      <div class="ans-box" id="ans5">-</div>
    </div>
  </div>

  <script type="module">
    // Firebase SDK 読み込み
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    import { songListBGM } from "../songlist_BGM.js";
    import { songListSAS } from "../songlist_SAS.js";

    // Firebase 設定
    const firebaseConfig = {
      apiKey: "AIzaSyBiMbPLYjpzKyeb5JH8djxTRTEMhSDXjdk",
      authDomain: "intro-21.firebaseapp.com",
      databaseURL: "https://intro-21-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "intro-21",
      storageBucket: "intro-21.firebasestorage.app",
      messagingSenderId: "147380245042",
      appId: "1:147380245042:web:95784f969f8a3150bfe22b"
    };

    // Firebase 初期化
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // SC1（Ready）
    window.sendSC1 = function () {
      set(ref(db, "commands/current"), "SC1");
      set(ref(db, "answers/list"), []);  // 回答者リストをリセット
      used = []; // ★ 重複防止リセット
      document.getElementById("ans1").textContent = "-";
      document.getElementById("ans2").textContent = "-";
      document.getElementById("ans3").textContent = "-";
      document.getElementById("ans4").textContent = "-";
      document.getElementById("ans5").textContent = "-";
    };

    // SC2（イントロ再生）
  window.sendSC2 = function (folder, speed, songNo) {
    const cmd = `SC2,${folder},${speed},${songNo}`;
    set(ref(db, "commands/current"), cmd);
    document.getElementById("debug").textContent = "SC2 sent: " + cmd;
  };

    // SC4（正解発表）
    window.sendSC4 = function (folder, speed, songNo) {
      const cmd = `SC4,${folder},${speed},${songNo}`;
      set(ref(db, "commands/current"), cmd);
    };

    // 選曲結果を保持（SC2/SC4 で使う）
    let selectedFolder = 1;   // 1=BGM, 2=SAS
    let selectedSongNo = 0;   // 1〜90 or 1〜20

    // ★★★ 重複防止用の配列（フォルダ別に管理） ★★★
    let used = [];  // {folder:1, no:5} のように保存

    window.selectSong = function () {
      // ★ フォルダ選択（UI の ComboBox などで選ぶ想定）
      const folder = Number(document.getElementById("folder").value);
      selectedFolder = folder;

      // ★ 曲リストを決定
      const list = (folder === 1) ? songListBGM : songListSAS;

      // ★ 未使用曲だけを抽出
      const unused = list.filter(song =>
        !used.some(u => u.folder === folder && u.no === song.no)
      );

      // ★ 未使用曲がゼロなら終了（エラー防止）
      if (unused.length === 0) {
        alert("このフォルダの曲はすべて使用済みです！");
        return;
      }

      // ★ ランダム選曲
      // ★ unused から選ぶ（修正ポイント）
      const r = Math.floor(Math.random() * unused.length);
      const song = unused[r];

      // ★ 選曲番号を保持（SC2/SC4 で使う）
      selectedSongNo = song.no;

      // ★ 使用済みに追加
      used.push({ folder, no: song.no });

      // ★ UI に反映
      document.getElementById("artist").textContent = song.artist;
      document.getElementById("title").textContent = song.title;

      // ★ 選曲数カウンタを増やす
      const cnt = Number(document.getElementById("count").textContent);
      document.getElementById("count").textContent = cnt + 1;
    };

    window.sendPlay = function () {
      const speed = Number(document.getElementById("speed").value);
      sendSC2(selectedFolder, speed, selectedSongNo);
    };

    window.sendAnswer = function () {
      const speed = Number(document.getElementById("speed").value);
      sendSC4(selectedFolder, speed, selectedSongNo);
    };

    // ★ SC3（回答者ID）受信
    onValue(ref(db, "answers/list"), (snapshot) => {
    const list = snapshot.val();
    if (!list) return;

    const ids = Object.values(list); // push() のため配列化

    // ★ 5件まで表示
    document.getElementById("ans1").textContent = ids[0] ?? "-";
    document.getElementById("ans2").textContent = ids[1] ?? "-";
    document.getElementById("ans3").textContent = ids[2] ?? "-";
    document.getElementById("ans4").textContent = ids[3] ?? "-";
    document.getElementById("ans5").textContent = ids[4] ?? "-";
    });
  </script>

</body>
</html>
